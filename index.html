<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>經典俄羅斯方塊 Tetris</title>
    <style>
        body {
            background-color: #202020;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .game-container {
            display: flex;
            align-items: flex-start;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        canvas {
            border: 4px solid #333;
            background-color: #000;
        }

        .side-panel {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 600px;
            min-width: 120px;
        }

        .info-box {
            background: #222;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #444;
            text-align: center;
        }

        .info-box h2 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .info-box p {
            margin: 0;
            font-size: 1.8rem;
            font-weight: bold;
            color: #00f0ff;
        }

        .controls {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.5;
        }
        
        .controls span {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>TETRIS</h1>

    <div class="game-container">
        <canvas id="tetris" width="300" height="600"></canvas>

        <div class="side-panel">
            <div class="info-box">
                <h2>分數 Score</h2>
                <p id="score">0</p>
            </div>
            <div class="info-box">
                <h2>等級 Level</h2>
                <p id="level">1</p>
            </div>
            <div class="info-box">
                <h2>消行 Lines</h2>
                <p id="lines">0</p>
            </div>
            
            <div class="controls">
                <h3>操作說明：</h3>
                <p>⬅️ ➡️ : 左右移動</p>
                <p>⬆️ : 旋轉方塊</p>
                <p>⬇️ : 加速下落</p>
                <p><span>空白鍵</span> : 瞬間下落</p>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('tetris');
const context = canvas.getContext('2d');

const GRID_SIZE = 30;
const ROW = 20;
const COL = 10;

let score = 0;
let level = 1;
let linesCleared = 0;

context.scale(GRID_SIZE, GRID_SIZE);

function createMatrix(w, h) {
    const matrix = [];
    while (h--) {
        matrix.push(new Array(w).fill(0));
    }
    return matrix;
}

const arena = createMatrix(COL, ROW);

const SHAPES = 'ILJOTSZ';
const COLORS = [
    null,
    '#00f0ff', // I
    '#0000ff', // L
    '#ffa500', // J
    '#ffff00', // O
    '#00ff00', // T
    '#a020f0', // S
    '#ff0000'  // Z
];

function createPiece(type) {
    if (type === 'T') {
        return [
            [0, 0, 0],
            [1, 1, 1],
            [0, 1, 0],
        ];
    } else if (type === 'O') {
        return [
            [2, 2],
            [2, 2],
        ];
    } else if (type === 'L') {
        return [
            [0, 0, 3],
            [3, 3, 3],
            [0, 0, 0],
        ];
    } else if (type === 'J') {
        return [
            [4, 0, 0],
            [4, 4, 4],
            [0, 0, 0],
        ];
    } else if (type === 'I') {
        return [
            [0, 0, 0, 0],
            [5, 5, 5, 5],
            [0, 0, 0, 0],
            [0, 0, 0, 0],
        ];
    } else if (type === 'S') {
        return [
            [0, 6, 6],
            [6, 6, 0],
            [0, 0, 0],
        ];
    } else if (type === 'Z') {
        return [
            [7, 7, 0],
            [0, 7, 7],
            [0, 0, 0],
        ];
    }
}

const player = {
    pos: {x: 0, y: 0},
    matrix: null,
};

function playerReset() {
    const pieces = SHAPES;
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0;
    player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    if (collide(arena, player)) {
        alert('遊戲結束！您的得分是: ' + score);
        arena.forEach(row => row.fill(0));
        score = 0;
        level = 1;
        linesCleared = 0;
        updateScore();
    }
}

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                context.fillStyle = COLORS[value];
                context.fillRect(x + offset.x, y + offset.y, 1, 1);
                
                context.strokeStyle = '#111';
                context.lineWidth = 0.05;
                context.strokeRect(x + offset.x, y + offset.y, 1, 1);
            }
        });
    });
}

function draw() {
    context.fillStyle = '#000';
    context.fillRect(0, 0, canvas.width, canvas.height);

    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 &&
               (arena[y + o.y] &&
                arena[y + o.y][x + o.x]) !== 0) {
                return true;
            }
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
            if (value !== 0) {
                arena[y + player.pos.y][x + player.pos.x] = value;
            }
        });
    });
}

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) {
                continue outer;
            }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;

        score += rowCount * 10;
        rowCount *= 2;
        linesCleared++;
        
        level = Math.floor(linesCleared / 10) + 1;
    }
    updateScore();
}

function updateScore() {
    document.getElementById('score').innerText = score;
    document.getElementById('level').innerText = level;
    document.getElementById('lines').innerText = linesCleared;
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
    }
    dropCounter = 0;
}

function playerHardDrop() {
    while (!collide(arena, player)) {
        player.pos.y++;
    }
    player.pos.y--;
    merge(arena, player);
    playerReset();
    arenaSweep();
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) {
        player.pos.x -= dir;
    }
}

function rotate(matrix, dir) {
    for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
            [
                matrix[x][y],
                matrix[y][x],
            ] = [
                matrix[y][x],
                matrix[x][y],
            ];
        }
    }
    if (dir > 0) {
        matrix.forEach(row => row.reverse());
    } else {
        matrix.reverse();
    }
}

function playerRotate(dir) {
    const pos = player.pos.x;
    let offset = 1;
    rotate(player.matrix, dir);
    while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
            rotate(player.matrix, -dir);
            player.pos.x = pos;
            return;
        }
    }
}

let dropCounter = 0;
function getDropInterval() {
    return Math.max(100, 1000 - (level - 1) * 100);
}

let lastTime = 0;
function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;

    dropCounter += deltaTime;
    if (dropCounter > getDropInterval()) {
        playerDrop();
    }

    draw();
    requestAnimationFrame(update);
}

document.addEventListener('keydown', event => {
    if (event.keyCode === 37) { // Left
        playerMove(-1);
    } else if (event.keyCode === 39) { // Right
        playerMove(1);
    } else if (event.keyCode === 40) { // Down
        playerDrop();
    } else if (event.keyCode === 38) { // Up
        playerRotate(1);
    } else if (event.keyCode === 32) { // Space
        playerHardDrop();
    }
});

playerReset();
updateScore();
update();
</script>
</body>
</html>
